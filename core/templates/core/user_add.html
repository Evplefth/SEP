{% extends "core/base.html" %}
{% block title %}Νέος Χρήστης{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Νέος Χρήστης</h1>
    <p class="text-gray-500 text-sm mt-1">Η δημιουργία χρηστών επιτρέπεται μόνο σε διαχειριστή.</p>
  </div>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-5 py-4 mb-6">{{ error }}</div>
  {% endif %}

  <form method="post" class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 space-y-5">
    {% csrf_token %}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Username</label>
        <input type="text" name="username" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Email</label>
        <input type="email" name="email" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Όνομα</label>
        <input type="text" name="first_name" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Επώνυμο</label>
        <input type="text" name="last_name" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Κωδικός</label>
        <input type="password" name="password1" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1.5">Επανάληψη Κωδικού</label>
        <input type="password" name="password2" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
      </div>
    </div>

    <label class="flex items-center gap-2 text-sm text-gray-700">
      <input type="checkbox" name="is_staff" checked class="w-4 h-4 accent-blue-600">
      Δικαιώματα διαχειριστή
    </label>

    <div class="flex justify-end gap-3 pt-2">
      <a href="{% url 'core:users' %}" class="px-6 py-2.5 text-sm font-medium text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition text-center">Ακύρωση</a>
      <button type="submit" class="px-8 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition">Δημιουργία Χρήστη</button>
    </div>
  </form>
</div>
{% endblock %}
