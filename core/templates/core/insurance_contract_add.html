{% extends "core/base.html" %}
{% block title %}Νέο Συμβόλαιο — {{ ins.name }}{% endblock %}

{% block content %}

<!-- Header -->
<div class="flex items-center gap-4 mb-6">
  <a href="{% url 'core:insurance_company_detail' ins.id %}" class="text-gray-400 hover:text-gray-600 transition">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
  </a>
  <div>
    <h1 class="text-2xl font-bold text-gray-800">Νέο Συμβόλαιο</h1>
    <p class="text-gray-500 text-sm mt-0.5">
      Ασφαλιστική: <span class="font-semibold text-blue-600">{{ ins.name }}</span>
    </p>
  </div>
</div>

{% if error %}
<div class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-5 py-4 mb-6">
  <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
  </svg>
  {{ error }}
</div>
{% endif %}

<form method="post" class="space-y-6">
  {% csrf_token %}

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex items-center gap-2">
      <div class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center">
        <svg class="w-3.5 h-3.5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <h2 class="font-semibold text-gray-800 text-sm">Στοιχεία Συμβολαίου</h2>
    </div>
    <div class="px-6 py-5 grid grid-cols-1 sm:grid-cols-2 gap-5">

      <!-- Αριθμός συμβολαίου -->
      <div>
        <label for="contract_number" class="block text-xs font-semibold text-gray-600 mb-1.5">
          Αριθμός Συμβολαίου <span class="text-red-400">*</span>
        </label>
        <input type="text" name="contract_number" id="contract_number"
          placeholder="π.χ. ΟΑΣ-2024-001"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

      <!-- Τύπος κάλυψης -->
      <div>
        <label for="coverage_type" class="block text-xs font-semibold text-gray-600 mb-1.5">Τύπος Κάλυψης</label>
        <input type="text" name="coverage_type" id="coverage_type"
          placeholder="π.χ. Ιατροφαρμακευτική, Ζωής..."
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

      <!-- Ποσό -->
      <div>
        <label for="amount" class="block text-xs font-semibold text-gray-600 mb-1.5">Ποσό Ασφαλίστρου (€)</label>
        <input type="number" step="0.01" min="0" name="amount" id="amount"
          placeholder="0.00"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

      <!-- Ενεργό -->
      <div class="flex items-end pb-1">
        <label class="flex items-center gap-2 text-sm text-gray-700">
          <input type="checkbox" name="active" checked class="w-4 h-4 accent-blue-600">
          Ενεργό Συμβόλαιο
        </label>
      </div>

      <!-- Ημ. Έναρξης -->
      <div>
        <label for="start_date" class="block text-xs font-semibold text-gray-600 mb-1.5">Ημ. Έναρξης</label>
        <input type="date" name="start_date" id="start_date"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

      <!-- Ημ. Λήξης -->
      <div>
        <label for="end_date" class="block text-xs font-semibold text-gray-600 mb-1.5">Ημ. Λήξης</label>
        <input type="date" name="end_date" id="end_date"
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
      </div>

      <!-- Παρατηρήσεις -->
      <div class="sm:col-span-2">
        <label for="notes" class="block text-xs font-semibold text-gray-600 mb-1.5">Παρατηρήσεις</label>
        <textarea name="notes" id="notes" rows="3"
          placeholder="Επιπλέον πληροφορίες για το συμβόλαιο..."
          class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm text-gray-800 placeholder-gray-400 outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"></textarea>
      </div>

    </div>
  </div>

  <!-- Buttons -->
  <div class="flex flex-col sm:flex-row justify-end gap-3 pb-6">
    <a href="{% url 'core:insurance_company_detail' ins.id %}"
       class="px-6 py-2.5 text-sm font-medium text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition text-center">
      Ακύρωση
    </a>
    <button type="submit"
       class="px-8 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition flex items-center justify-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
      Καταχώρηση Συμβολαίου
    </button>
  </div>

</form>
{% endblock %}
